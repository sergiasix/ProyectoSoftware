<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RailTravel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <a href="index.html" class="logo">🚆 RailTravel</a>

    <div class="menu">
        <button onclick="window.location.href='reservas.html'">Mis reservas</button>
        
        <span id="usuario-info"></span>

        <button onclick="logout()" class="logout-btn">Cerrar sesión</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Encuentra tu tren al mejor precio</h1>

    <div class="search-box">

    <!-- FILA 1 -->
    <div class="fila">
        <input id="origen" placeholder="Origen (Madrid)">
        <input id="destino" placeholder="Destino (Barcelona)">
        <button onclick="buscar()">Buscar</button>

        <select id="pasajero">
            <option value="adulto">1 adulto</option>
            <option value="niño">1 niño</option>
            <option value="senior">1 senior</option>
        </select>
    </div>

    <!-- FILA 2 -->
    <div class="fila tipo-viaje">
    <label class="opcion">
        <input type="radio" name="tipo" value="ida" checked onclick="cambiarTipo()">
        <span>Solo ida</span>
    </label>

    <label class="opcion">
        <input type="radio" name="tipo" value="idaVuelta" onclick="cambiarTipo()">
        <span>Ida y vuelta</span>
    </label>
</div>

    <!-- FILA 3 -->
    <div class="fila fechas">
        <input type="date" id="fechaIda">
        <input type="date" id="fechaVuelta" style="display:none;">
    </div>

</div>

</div>

<!-- RESULTADOS -->
<div class="container">
    <div id="resultados"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // 📅 FECHAS
    const hoy = new Date().toISOString().split("T")[0];

    const fechaIda = document.getElementById("fechaIda");
    const fechaVuelta = document.getElementById("fechaVuelta");

    fechaIda.min = hoy;
    fechaVuelta.min = hoy;

    // 👉 controlar ida → vuelta
    fechaIda.addEventListener("change", (e) => {
        const nuevaFecha = e.target.value;

        fechaVuelta.min = nuevaFecha;

        if (fechaVuelta.value && fechaVuelta.value < nuevaFecha) {
            fechaVuelta.value = "";
        }
    });

    // 👤 USUARIO
    const usuarioId = localStorage.getItem("usuarioId");
    const nombre = localStorage.getItem("usuarioNombre");

    const info = document.getElementById("usuario-info");
    const menu = document.querySelector(".menu");

    if (usuarioId && nombre) {
        if (info) {
            info.innerText = "👤 " + nombre;
        }
    } else {
        menu.innerHTML = `
            <button onclick="window.location.href='login.html'">Iniciar sesión</button>
            <button onclick="window.location.href='usuario.html'">Crear cuenta</button>
        `;
    }

});
   document.addEventListener("DOMContentLoaded", () => {

    const usuarioId = localStorage.getItem("usuarioId");
    const nombre = localStorage.getItem("usuarioNombre");

    const info = document.getElementById("usuario-info");
    const menu = document.querySelector(".menu");

    if (usuarioId && nombre) {
        // 🔐 USUARIO LOGUEADO
        if (info) {
            info.innerText = "👤 " + nombre;
        }

    } else {
        // 🔓 USUARIO NO LOGUEADO
        menu.innerHTML = `
            <button onclick="window.location.href='login.html'">Iniciar sesión</button>
            <button onclick="window.location.href='usuario.html'">Crear cuenta</button>
        `;
    }

});
async function buscar() {
    const origen = document.getElementById("origen").value;
    const destino = document.getElementById("destino").value;

    const fechaIda = document.getElementById("fechaIda").value;
const fechaVuelta = document.getElementById("fechaVuelta").value;
const tipo = document.querySelector('input[name="tipo"]:checked').value;

    if (!fechaIda) {
        alert("Selecciona una fecha de ida");
        return;
    }

    if (tipo === "idaVuelta" && !fechaVuelta) {
        alert("Selecciona una fecha de vuelta");
        return;
    }
    const res = await fetch(`http://localhost:8080/api/trains/search?origen=${origen}&destino=${destino}`);
    const data = await res.json();

    const contenedor = document.getElementById("resultados");
    contenedor.innerHTML = "";

    data.forEach(t => {
        const div = document.createElement("div");
        div.className = "resultado";

        div.innerHTML = `
            <div>
                <strong>${t.operador}</strong><br>
                ${t.salida} - ${t.llegada}
            </div>
            <div class="precio">${t.precio.toFixed(2)}€</div>
        `;
div.onclick = () => {
    const pasajero = document.getElementById("pasajero").value;

    const dataConTodo = {
        ...t,
        pasajero: pasajero,
        fechaIda: fechaIda,
        fechaVuelta: tipo === "idaVuelta" ? fechaVuelta : null,
        tipoViaje: tipo
    };

    const dataEncoded = encodeURIComponent(JSON.stringify(dataConTodo));
    window.location.href = `asientos.html?data=${dataEncoded}`;
};
        contenedor.appendChild(div);
    });
}

// 🔥 AQUÍ VA
const usuarioId = localStorage.getItem("usuarioId");

if (usuarioId) {
    console.log("Usuario logueado:", usuarioId);
}

function logout() {
    localStorage.removeItem("usuarioId");
    localStorage.removeItem("usuarioNombre");
    alert("Sesión cerrada");
    window.location.href = "index.html";
}

function cambiarTipo() {
    const tipo = document.querySelector('input[name="tipo"]:checked').value;
    const vuelta = document.getElementById("fechaVuelta");

    if (tipo === "idaVuelta") {
        vuelta.style.display = "block";
    } else {
        vuelta.style.display = "none";
        vuelta.value = ""; 
    }
}
</script>

</body>
</html>
