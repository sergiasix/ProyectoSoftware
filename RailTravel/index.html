<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Buscar trenes</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="container">
        <h1>Buscar trenes</h1>

        <div class="search-box">
            <input id="origen" placeholder="Origen">
            <input id="destino" placeholder="Destino">
            <button onclick="buscar()">Buscar</button>
        </div>

        <div id="resultados"></div>
    </div>

    <script>async function buscar() {
            const origen = document.getElementById("origen").value;
            const destino = document.getElementById("destino").value;

            const res = await fetch(`http://localhost:8080/api/trains/search?origen=${origen}&destino=${destino}`);
            const data = await res.json();

            const contenedor = document.getElementById("resultados");
            contenedor.innerHTML = "";

            data.forEach(t => {
                const div = document.createElement("div");
                div.className = "resultado";

                div.innerHTML = `
            <span>${t.operador} | ${t.salida} - ${t.llegada}</span>
            <span class="precio">${t.precio.toFixed(2)}€</span>
        `;

                
                div.onclick = () => {
                    const data = encodeURIComponent(JSON.stringify(t));
                    window.location.href = `asientos.html?data=${data}`;
                };
                
                contenedor.appendChild(div);
            });
        }</script>

</body>

</html>
